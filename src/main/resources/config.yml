# ============================================================
# Арена битв
# ============================================================
arena:
  world: "dragon_arena"
  x: 0.5
  y: 100.0
  z: 0.5

# ============================================================
# Настройки битв
# ============================================================
battle:
  arena-size: 75
  arena-wall-height: 22
  bleacher-rows: 3
  arena-spacing: 300.0
  max-concurrent-battles: 5
  ai-tick-interval: 15
  ai-cooldown-fire-cannon: 4000
  ai-cooldown-fireball-fan: 8000
  ai-cooldown-melee: 3000
  melee-range: 18.0
  melee-damage-percent: 0.10
  dodge-cooldown-seconds: 5
  dodge-strength: 1.6

# Награды и восстановление
battle-win-exp: 50
battle-win-coins: 100
recovery-time: 5

# ============================================================
# Типы драконов
# ============================================================
dragon-types:
  FIRE:
    display-name: "&c&lОгненный Дракон"
    health: 120.0
    damage: 12.0
    color: "&c"
    farm-resources:
      - "BLAZE_ROD:1"
      - "GUNPOWDER:2"
      - "MAGMA_CREAM:1"
  ICE:
    display-name: "&b&lЛедяной Дракон"
    health: 100.0
    damage: 10.0
    color: "&b"
    farm-resources:
      - "SNOWBALL:8"
      - "ICE:2"
      - "PACKED_ICE:1"
  SHADOW:
    display-name: "&8&lТеневой Дракон"
    health: 90.0
    damage: 15.0
    color: "&8"
    farm-resources:
      - "ENDER_PEARL:1"
      - "OBSIDIAN:1"
      - "NETHER_STAR:0"  # Очень редкий ресурс (0 = не даёт)
  EMERALD:
    display-name: "&a&lИзумрудный Дракон"
    health: 110.0
    damage: 11.0
    color: "&a"
    farm-resources:
      - "EMERALD:1"
      - "GOLD_INGOT:2"
      - "DIAMOND:0"      # Очень редкий

# ============================================================
# Характеристики роста
# ============================================================
health-per-level: 5.0
damage-per-level: 1.0
exp-per-level-base: 100
max-dragons-per-player: 10
dragon-name-max-length: 20

# ============================================================
# Уровни эволюции (суффикс к имени)
# ============================================================
evolution-levels:
  10: "★"
  25: "★★"
  50: "★★★"
  75: "★★★★"
  100: "★★★★★"

# ============================================================
# Орбита
# ============================================================
orbit:
  radius: 8.0
  height-above-player: 6.0
  speed: 0.05
  particles: true

# ============================================================
# Охрана (Guard)
# ============================================================
guard:
  radius: 16.0
  damage-per-hit: 8.0
  attack-cooldown-ticks: 20
  particles: true

# ============================================================
# Ферма
# ============================================================
farm-interval: 60  # минут

# ============================================================
# Функции (включение/выключение)
# ============================================================
features:
  orbit: true
  guard: true
  auto-farm: true
  chest: true
  chest-particles: true

# ============================================================
# Заблокированные миры (запрещают спавн дракона)
# ============================================================
blocked-worlds:
  - "world_nether"
  - "world_the_end"
